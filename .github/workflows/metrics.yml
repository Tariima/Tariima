name: Metrics
on:
  # se actualiza solo, todos los días a las 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # permite correrlo a mano desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tariima
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires

          # Incluir actividad de repositorios privados
          repositories_affiliations: owner, collaborator, organization_member
          base_indepth: yes

          # Lenguajes más usados
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Calendario de actividad (isométrico)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
